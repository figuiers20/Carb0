<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carb0 — Your Recommendation</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #000; --white: #fff; --dim: #666; --grey: #999; --light: #ccc; --accent: #FC4C02; }

  body { background: var(--black); color: var(--white); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
  .logo span { opacity: 0.5; }
  .athlete-name { font-size: 11px; color: var(--grey); letter-spacing: 1px; }

  .loading { text-align: center; padding: 80px 0; font-size: 12px; color: var(--grey); letter-spacing: 2px; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .loading-dot { animation: pulse 1.2s infinite; }

  .section-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: ''; display: block; width: 14px; height: 1px; background: var(--dim); }

  /* ── Stats Grid ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { border: 1px solid rgba(255,255,255,0.1); padding: 16px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; }
  .stat-unit { font-size: 10px; color: var(--grey); letter-spacing: 2px; margin-top: 4px; }

  /* ── Calorie row ── */
  .calorie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .calorie-card { border: 1px solid rgba(255,255,255,0.1); padding: 16px; }
  .calorie-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; color: var(--accent); }
  .calorie-unit { font-size: 10px; color: var(--grey); letter-spacing: 2px; margin-top: 4px; }
  .calorie-note { font-size: 9px; color: var(--dim); margin-top: 6px; }

  /* ── Weekly Chart ── */
  .chart-container { margin-bottom: 32px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; }
  .chart-row { display: flex; align-items: flex-end; gap: 4px; height: 140px; padding-bottom: 24px; position: relative; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; min-height: 2px; background: rgba(255,255,255,0.7); border-radius: 2px 2px 0 0; transition: all 0.3s; position: relative; }
  .chart-bar:hover { background: var(--accent); }
  .chart-bar-tooltip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--white); color: var(--black); font-size: 9px; padding: 4px 8px;
    white-space: nowrap; border-radius: 3px; font-weight: 600; z-index: 10;
  }
  .chart-bar:hover .chart-bar-tooltip { display: block; }
  .chart-label { font-size: 8px; color: var(--dim); margin-top: 6px; letter-spacing: 1px; }
  .chart-legend { display: flex; gap: 16px; margin-top: 12px; font-size: 10px; color: var(--grey); }
  .chart-legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 1px; margin-right: 4px; vertical-align: middle; }

  /* ── Recommendation Box ── */
  .reco-box { border: 1.5px solid var(--white); padding: 28px; margin-bottom: 32px; display: grid; grid-template-columns: auto 1fr auto; gap: 28px; align-items: center; }
  .reco-sachet { width: 100px; height: 130px; border: 1.5px solid var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .reco-sachet-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; }
  .reco-sachet-g { font-size: 10px; letter-spacing: 2px; color: var(--grey); }
  .reco-count { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; }
  .reco-count-label { font-size: 11px; color: var(--grey); letter-spacing: 1px; margin-top: 4px; }
  .reco-monthly { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .reco-math { font-size: 10px; color: var(--dim); line-height: 1.8; margin-top: 12px; }
  .reco-price { text-align: right; }
  .reco-total { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; }
  .reco-total-label { font-size: 10px; color: var(--grey); letter-spacing: 2px; margin-top: 4px; }

  /* ── Size toggle ── */
  .size-toggle { display: flex; gap: 8px; margin-bottom: 24px; }
  .size-btn { background: transparent; color: var(--dim); border: 1px solid rgba(255,255,255,0.12); padding: 8px 20px; font-family: inherit; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
  .size-btn.active { background: var(--white); color: var(--black); border-color: var(--white); font-weight: 600; }
  .size-btn:hover:not(.active) { border-color: var(--grey); color: var(--grey); }

  /* ── Savings ── */
  .savings-box { border: 1px solid rgba(255,255,255,0.1); padding: 24px; margin-bottom: 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .savings-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
  .savings-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; margin-top: 4px; }
  .savings-value.strikethrough { color: var(--dim); text-decoration: line-through; }
  .savings-sub { font-size: 10px; color: var(--grey); margin-top: 2px; }

  /* ── Activity list ── */
  .activity-list { margin-bottom: 16px; }
  .activity-row { display: grid; grid-template-columns: 1fr 70px 70px 60px 70px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 11px; color: var(--grey); }
  .activity-row.head { color: var(--dim); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .activity-fuelable { color: var(--white); }

  /* ── Delivery ── */
  .delivery-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 32px; }
  .delivery-info { font-size: 12px; color: var(--grey); }
  .delivery-info strong { color: var(--white); font-weight: 600; }
  .btn { font-family: inherit; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--white); color: var(--black); border: 1.5px solid var(--white); font-weight: 600; }
  .btn-primary:hover { background: transparent; color: var(--white); }
  .btn-secondary { background: transparent; color: var(--grey); border: 1px solid rgba(255,255,255,0.12); }

  .strava-attribution { text-align: center; padding: 12px 0 20px; font-size: 10px; letter-spacing: 2px; color: var(--dim); }
  .strava-attribution svg { width: 14px; height: 14px; vertical-align: middle; margin-right: 4px; }
  .view-on-strava { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 10px; letter-spacing: 1px; }
  .view-on-strava:hover { text-decoration: underline; }
  .disconnect { text-align: center; padding: 20px; }
  .disconnect a { color: var(--dim); font-size: 10px; letter-spacing: 2px; text-decoration: none; text-transform: uppercase; }
  .disconnect a:hover { color: var(--grey); }

  @media (max-width: 700px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .calorie-grid { grid-template-columns: 1fr; }
    .reco-box { grid-template-columns: 1fr; text-align: center; }
    .reco-sachet { margin: 0 auto; }
    .reco-price { text-align: center; }
    .savings-box { grid-template-columns: 1fr; }
    .activity-row { grid-template-columns: 1fr 60px 60px; }
    .activity-row > :nth-child(4), .activity-row > :nth-child(5) { display: none; }
    .delivery-bar { flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">CARB<span>0</span></div>
    <div class="athlete-name" id="athlete-name"></div>
  </div>
  <div id="content">
    <div class="loading"><span class="loading-dot">ANALYZING 90 DAYS OF RIDES</span></div>
  </div>
</div>

<script>
const athleteId = "{{ athlete_id }}";
let currentData = null;
let currentSachetSize = null;

async function fetchRecommendation(sachetSize) {
  let url = `/api/recommendation?athlete=${athleteId}`;
  if (sachetSize) url += `&sachet_size=${sachetSize}`;
  const res = await fetch(url);
  if (res.status === 401) { window.location.href = '/?error=session_expired'; return; }
  return res.json();
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function formatWeek(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function fmtNum(n) { return n ? n.toLocaleString() : '0'; }

function buildChart(weeklyData) {
  if (!weeklyData || weeklyData.length === 0) {
    return '<div style="padding:20px;color:#666;font-size:11px;text-align:center">No weekly data available</div>';
  }
  const maxHours = Math.max(...weeklyData.map(w => w.hours), 1);

  const bars = weeklyData.map(w => {
    const pct = (w.hours / maxHours) * 100;
    const fuelPct = (w.fuelable_hours / maxHours) * 100;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${Math.max(pct, 1.5)}%; position:relative;">
        <div class="chart-bar-tooltip">${w.hours}h · ${w.rides} rides · ${fmtNum(w.calories)} kcal</div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:${maxHours > 0 ? (fuelPct/pct*100) : 0}%;background:var(--accent);border-radius:2px 2px 0 0;opacity:0.7;"></div>
      </div>
      <div class="chart-label">${formatWeek(w.week_start)}</div>
    </div>`;
  }).join('');

  return `<div class="chart-row">${bars}</div>
    <div class="chart-legend">
      <span><span class="chart-legend-dot" style="background:rgba(255,255,255,0.7)"></span> Total hours</span>
      <span><span class="chart-legend-dot" style="background:var(--accent);opacity:0.7"></span> Fuelable hours</span>
    </div>`;
}

function render(data) {
  currentData = data;
  currentSachetSize = data.recommendation.sachet_size;
  const p = data.profile;
  const r = data.recommendation;
  const s = data.savings;
  const d = data.delivery;
  const cal = data.calories;

  document.getElementById('athlete-name').textContent =
    data.athlete ? `${data.athlete.firstname} ${data.athlete.lastname}` : '';

  const activitiesHtml = (data.activities || [])
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 20)
    .map(a => {
      const fuelable = a.hours >= 0.75;
      const cals = a.watts ? Math.round(a.watts * a.hours * 3.6) : Math.round(a.hours * 500);
      return `<div class="activity-row">
        <div class="${fuelable ? 'activity-fuelable' : ''}">${a.name}</div>
        <div>${formatDate(a.date)}</div>
        <div>${a.hours}h</div>
        <div>${a.km}km</div>
        <div>${fmtNum(cals)} kcal</div>
      </div>`;
    }).join('');

  document.getElementById('content').innerHTML = `
    <!-- Sachet Size -->
    <div class="section-label">Sachet Size</div>
    <div class="size-toggle">
      <button class="size-btn ${r.sachet_size === 60 ? 'active' : ''}" onclick="switchSize(60)">60g — Standard</button>
      <button class="size-btn ${r.sachet_size === 90 ? 'active' : ''}" onclick="switchSize(90)">90g — High Output</button>
    </div>

    <!-- Riding Profile -->
    <div class="section-label">Last ${p.window_days} Days</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${p.weekly_hours}</div><div class="stat-unit">hours / week</div></div>
      <div class="stat-card"><div class="stat-value">${p.weekly_rides}</div><div class="stat-unit">rides / week</div></div>
      <div class="stat-card"><div class="stat-value">${p.total_rides}</div><div class="stat-unit">total rides</div></div>
      <div class="stat-card"><div class="stat-value">${fmtNum(p.total_km)}</div><div class="stat-unit">km ridden</div></div>
    </div>

    <!-- Calories -->
    <div class="section-label">Energy Burned</div>
    <div class="calorie-grid">
      <div class="calorie-card">
        <div class="calorie-value">${fmtNum(cal.total_calories)}</div>
        <div class="calorie-unit">total kcal (${p.window_days} days)</div>
        <div class="calorie-note">${cal.rides_with_power_data} of ${cal.total_rides} rides measured with power</div>
      </div>
      <div class="calorie-card">
        <div class="calorie-value">${fmtNum(cal.avg_calories_per_week)}</div>
        <div class="calorie-unit">avg kcal / week</div>
        ${p.avg_watts ? `<div class="calorie-note">Avg power: ${p.avg_watts}W across rides with power meter</div>` : ''}
      </div>
      <div class="calorie-card">
        <div class="calorie-value">${fmtNum(cal.avg_calories_per_ride)}</div>
        <div class="calorie-unit">avg kcal / ride</div>
        <div class="calorie-note">${p.fuelable_rides} rides ≥45min needed fueling</div>
      </div>
    </div>

    <!-- Weekly Trend -->
    <div class="section-label">Weekly Volume (hover for details)</div>
    <div class="chart-container">
      ${buildChart(data.weekly_breakdown)}
    </div>

    <!-- Quarterly Recommendation -->
    <div class="section-label">Your Quarterly Box</div>
    <div class="reco-box">
      <div class="reco-sachet"><div class="reco-sachet-num">${r.sachet_size}</div><div class="reco-sachet-g">GRAMS</div></div>
      <div>
        <div class="reco-count">${r.recommended_sachets}</div>
        <div class="reco-count-label">sachets per quarter</div>
        <div class="reco-monthly">≈ ${r.monthly_equivalent} sachets / month</div>
        <div class="reco-math">
          ${r.adjusted_quarterly_hours}h fuelable × ${r.carbs_per_hour}g/h = ${fmtNum(r.total_grams_needed)}g ÷ ${r.sachet_size}g = ${r.raw_sachets} sachets
          ${r.seasonal_factor !== 1 ? '<br>seasonal adj: ×' + r.seasonal_factor : ''}
        </div>
      </div>
      <div class="reco-price">
        <div class="reco-total">€${s.quarterly_cost_carb0.toFixed(2)}</div>
        <div class="reco-total-label">per quarter</div>
      </div>
    </div>

    <!-- Savings -->
    <div class="section-label">vs Premium Brands</div>
    <div class="savings-box">
      <div><div class="savings-label">Them</div><div class="savings-value strikethrough">€${s.competitor_price.toFixed(2)}</div><div class="savings-sub">per serving avg</div></div>
      <div><div class="savings-label">Carb0</div><div class="savings-value">€${s.price_per_sachet.toFixed(2)}</div><div class="savings-sub">per sachet</div></div>
      <div><div class="savings-label">You save</div><div class="savings-value">€${fmtNum(s.annual_savings)}</div><div class="savings-sub">per year (−${s.savings_percent}%)</div></div>
    </div>

    <!-- Next Delivery -->
    <div class="section-label">Next Delivery</div>
    <div class="delivery-bar">
      <div class="delivery-info">Ships <strong>${d.next_ship_date}</strong> — modify until ${d.modify_until}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="alert('Skip quarter — coming soon')">Skip</button>
        <button class="btn btn-primary" onclick="alert('Confirmed!')">Confirm</button>
      </div>
    </div>

    <!-- Recent Rides -->
    <div class="section-label">Recent Rides</div>
    <div class="activity-list">
      <div class="activity-row head"><div>Ride</div><div>Date</div><div>Time</div><div>Dist</div><div>Energy</div></div>
      ${activitiesHtml || '<div style="padding:16px 0;color:#666;font-size:11px">No cycling activities in the last 90 days</div>'}
    </div>
    <div style="text-align:right;margin-bottom:32px">
      <a href="https://www.strava.com/athlete/training" target="_blank" rel="noopener" class="view-on-strava">View on Strava</a>
    </div>

    <div class="strava-attribution">
      <svg viewBox="0 0 24 24" fill="#FC4C02"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
      Compatible with Strava
    </div>

    <div class="disconnect"><a href="/">← Disconnect</a></div>
  `;
}

async function switchSize(size) {
  if (size === currentSachetSize) return;
  const data = await fetchRecommendation(size);
  if (data) render(data);
}

(async () => {
  try {
    const data = await fetchRecommendation();
    if (data && !data.error) render(data);
    else window.location.href = '/?error=' + (data?.error || 'unknown');
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="loading" style="color:#ff6b6b">Failed to load. <a href="/" style="color:#ff6b6b">Try again</a></div>';
  }
})();
</script>
</body>
</html>
